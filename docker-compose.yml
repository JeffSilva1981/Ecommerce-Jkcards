version: "3.9"

services:

  db:
    image: postgres:16
    container_name: jkcards-db
    restart: always
    environment:
      POSTGRES_DB: jkcards
      POSTGRES_USER: jkcards_user
      POSTGRES_PASSWORD: jkcards_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: jkcards-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: dev

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jkcards
      SPRING_DATASOURCE_USERNAME: jkcards_user
      SPRING_DATASOURCE_PASSWORD: jkcards_pass

      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      SECURITY_CLIENT_ID: ${CLIENT_ID}
      SECURITY_CLIENT_SECRET: ${CLIENT_SECRET}
      JWT_DURATION: ${JWT_DURATION}

      CORS_ORIGINS: ${CORS_ORIGINS}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

volumes:
  pgdata: